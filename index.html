<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BioTracker — Gestione progetti bioinformatici in stile Kanban. Funziona offline e online.">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <title>BioTracker — Project Manager Bioinformatico</title>

    <!-- Google Fonts (con fallback offline) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="header-left">
            <div class="app-logo">
                <span class="logo-icon">🧬</span>
                <h1 class="logo-text">BioTracker</h1>
            </div>
            <div id="stats-bar" class="stats-bar"></div>
        </div>

        <div class="header-center">
            <div class="search-container">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/>
                </svg>
                <input type="text" id="global-search" class="search-input"
                       placeholder="Cerca analisi... (Ctrl+K)" autocomplete="off">
                <div id="filter-indicator" class="filter-indicator" style="display:none">
                    <span>Filtri attivi</span>
                    <button onclick="Search.clearFilters()" title="Rimuovi filtri">✕</button>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="filter-group">
                <select id="filter-priority" class="filter-select" title="Filtra per priorità">
                    <option value="">Tutte le priorità</option>
                    <option value="critical">🔴 Critica</option>
                    <option value="high">🟠 Alta</option>
                    <option value="medium">🟡 Media</option>
                    <option value="low">🟢 Bassa</option>
                </select>
                <select id="filter-pipeline" class="filter-select" title="Filtra per pipeline">
                    <option value="">Tutte le pipeline</option>
                    <option value="RNA-seq">RNA-seq</option>
                    <option value="WGS">WGS</option>
                    <option value="WES">WES</option>
                    <option value="ChIP-seq">ChIP-seq</option>
                    <option value="ATAC-seq">ATAC-seq</option>
                    <option value="Methylation">Methylation</option>
                    <option value="Metagenomica">Metagenomica</option>
                    <option value="Proteomica">Proteomica</option>
                    <option value="Single-cell">Single-cell</option>
                    <option value="Long-read">Long-read</option>
                    <option value="Variant Calling">Variant Calling</option>
                    <option value="Gene Expression">Gene Expression</option>
                    <option value="Pathway Analysis">Pathway Analysis</option>
                    <option value="Altro">Altro</option>
                </select>
            </div>
            <div class="action-group">
                <button id="btn-archive-toggle" class="btn-toolbar" onclick="Archive.toggle()" title="Archivio (analisi completate)">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M1.75 1h12.5a.75.75 0 0 1 .75.75v2.5a.75.75 0 0 1-.75.75H1.75A.75.75 0 0 1 1 4.25v-2.5A.75.75 0 0 1 1.75 1ZM2.5 2.5v1.5h11V2.5h-11Z"/>
                        <path d="M1.75 6h12.5a.75.75 0 0 1 .75.75v7.5a.75.75 0 0 1-.75.75H1.75a.75.75 0 0 1-.75-.75v-7.5A.75.75 0 0 1 1.75 6Zm.75 1.5v6h11v-6h-11Z"/>
                        <path d="M5.75 9.25a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1-.75-.75Z"/>
                    </svg>
                    <span class="btn-label">Archivio</span>
                </button>
                <button id="btn-export" class="btn-toolbar" title="Esporta backup (Ctrl+E)">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/>
                        <path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/>
                    </svg>
                    <span class="btn-label">Export</span>
                </button>
                <button id="btn-import" class="btn-toolbar" title="Importa backup">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/>
                        <path d="M11.78 4.72a.749.749 0 1 1-1.06 1.06L8.75 3.811V9.5a.75.75 0 0 1-1.5 0V3.811L5.28 5.78a.749.749 0 1 1-1.06-1.06l3.25-3.25a.749.749 0 0 1 1.06 0l3.25 3.25Z"/>
                    </svg>
                    <span class="btn-label">Import</span>
                </button>
                <input type="file" id="file-import" accept=".json" style="display: none">
            </div>
        </div>
    </header>

    <!-- ===== BOARD ===== -->
    <main class="board-container">
        <div id="board" class="board"></div>
    </main>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="login-overlay" class="login-overlay" style="display: flex;">
        <div class="login-box">
            <h2>🧬 BioTracker</h2>
            <p>I tuoi dati sono blindati su Firebase.<br>Accedi per visualizzare e modificare la tua lavagna privata.</p>
            <button id="btn-login-google" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Accedi con Google
            </button>
        </div>
    </div>

    <!-- ===== ARCHIVE PANEL ===== -->
    <aside id="archive-panel" class="archive-panel">
        <div class="archive-header">
            <h2>📦 Archivio Analisi</h2>
            <span id="archive-count" class="archive-count">0</span>
            <button class="archive-close" onclick="Archive.close()">✕</button>
        </div>
        <div class="archive-search-bar">
            <input type="text" id="archive-search" class="archive-search-input"
                   placeholder="Cerca nell'archivio..." oninput="Archive.refresh()">
        </div>
        <div id="archive-list" class="archive-list"></div>
    </aside>

    <!-- ===== MODAL ===== -->
    <div id="card-modal" class="card-modal" style="display: none"></div>

    <!-- ===== TOASTS ===== -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ===== SCRIPTS ===== -->
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    
    <script src="js/storage.js"></script>
    <script src="js/board.js"></script>
    <script src="js/card.js"></script>
    <script src="js/archive.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
